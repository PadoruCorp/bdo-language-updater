name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BDOLanguageUpdater.sln

      - name: Test
        run: dotnet test BDOLanguageUpdater.Tests/BDOLanguageUpdater.Tests.csproj --configuration Release --no-restore --logger "console;verbosity=minimal"

  publish:
    name: Publish ${{ matrix.rid }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive: zip
            artifact: BDOLanguageUpdater-win-x64
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
            artifact: BDOLanguageUpdater-linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.ref_type }}" -eq "tag" -and $tag.StartsWith("v")) {
            $version = $tag.Substring(1)
          } else {
            $version = "0.0.0-local"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?(-[0-9A-Za-z.-]+)?$') {
            throw "Release tag '$tag' must look like v2026.5.15 or v2026.5.15.1"
          }

          $assemblyVersion = ($version -replace '-.*$', '')
          if (($assemblyVersion.Split('.')).Length -eq 3) {
            $assemblyVersion = "$assemblyVersion.0"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "assembly-version=$assemblyVersion" >> $env:GITHUB_OUTPUT

      - name: Publish self-contained app
        shell: pwsh
        run: >
          dotnet publish BDOLanguageUpdater.WPF/BDOLanguageUpdater.WPF.csproj
          --configuration Release
          --framework net10.0
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output artifacts/${{ matrix.artifact }}
          -p:Version=${{ steps.version.outputs.version }}
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:ProductVersion=${{ steps.version.outputs.version }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assembly-version }}
          -p:FileVersion=${{ steps.version.outputs.assembly-version }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:PublishTrimmed=false
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Remove debug symbols
        shell: pwsh
        run: Get-ChildItem "artifacts/${{ matrix.artifact }}" -Recurse -Include *.pdb | Remove-Item -Force

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          if ("${{ matrix.archive }}" -eq "zip") {
            Compress-Archive -Path "artifacts/${{ matrix.artifact }}/*" -DestinationPath "release-assets/${{ matrix.artifact }}.zip" -Force
          } else {
            tar -czf "release-assets/${{ matrix.artifact }}.tar.gz" -C "artifacts/${{ matrix.artifact }}" .
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-assets/*

  github-release:
    name: GitHub Release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release-assets/*
